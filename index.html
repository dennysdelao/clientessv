<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Consulta de Cliente</title>

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

h1{
margin-bottom:30px;
}

input{
padding:12px;
font-size:18px;
border-radius:6px;
border:none;
width:220px;
}

button{
padding:12px 20px;
font-size:18px;
background:#22c55e;
border:none;
cursor:pointer;
border-radius:6px;
margin-left:10px;
}

button:hover{
background:#16a34a;
}

#resultado{
margin-top:40px;
background:#1e293b;
padding:25px;
border-radius:10px;
width:420px;
margin-left:auto;
margin-right:auto;
}

</style>

</head>

<body>

<h1>Consulta de Cliente</h1>

<input id="codigoCliente" placeholder="Ingrese código de cliente">

<button onclick="buscarCliente()">Buscar</button>

<div id="resultado"></div>

<script>

async function buscarCliente(){

let codigo = document.getElementById("codigoCliente").value.trim();

let response = await fetch("clientes.json");

let clientes = await response.json();

let clienteEncontrado = clientes.find(c => String(c.Codigo).trim() === codigo);

if(clienteEncontrado){

document.getElementById("resultado").innerHTML = `
<h2>${clienteEncontrado.Nombre}</h2>

<p><b>Ruta:</b> ${clienteEncontrado["Ruta Rep."]}</p>
<p><b>Código:</b> ${clienteEncontrado.Codigo}</p>
<p><b>Negocio:</b> ${clienteEncontrado.Negocio}</p>
<p><b>Canal:</b> ${clienteEncontrado.Canal}</p>
<p><b>Nombre Atención:</b> ${clienteEncontrado["Nombre atencion"]}</p>
<p><b>Frecuencia Visita:</b> ${clienteEncontrado["Frecuencia Visita"]}</p>
`;

}else{

document.getElementById("resultado").innerHTML = "Cliente no encontrado";

}

}

</script>

</body>

</html>
