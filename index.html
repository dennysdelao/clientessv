<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Consulta de Clientes</title>

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
padding:30px;
}

input{
padding:12px;
font-size:18px;
width:320px;
border-radius:6px;
border:none;
}

table{
margin-top:30px;
width:95%;
margin:auto;
border-collapse:collapse;
}

th{
background:#1e293b;
padding:10px;
}

td{
background:#334155;
padding:10px;
}

tr:hover{
background:#475569;
}

</style>

</head>

<body>

<h1>Consulta de Clientes</h1>

<input 
id="busqueda"
placeholder="Buscar por código o nombre"
onkeyup="buscarCliente()"
>

<table>

<thead>
<tr>
<th>Código</th>
<th>Nombre</th>
<th>Ruta Venta</th>
<th>Ruta Rep</th>
<th>Negocio</th>
<th>Canal</th>
<th>Nombre Atención</th>
<th>Frecuencia</th>
</tr>
</thead>

<tbody id="resultados"></tbody>

</table>

<script>

let clientes=[]

async function cargarClientes(){

const response = await fetch("excel-to-json.json")
clientes = await response.json()

}

function buscarCliente(){

const texto = document.getElementById("busqueda").value.toLowerCase()

if(texto===""){
document.getElementById("resultados").innerHTML=""
return
}

const resultados = clientes.filter(c =>

String(c.Codigo).includes(texto) ||
(c.Nombre && c.Nombre.toLowerCase().includes(texto))

)

mostrarResultados(resultados)

}

function mostrarResultados(lista){

let html=""

lista.slice(0,100).forEach(c=>{

html+=`

<tr>
<td>${c.Codigo}</td>
<td>${c.Nombre}</td>
<td>${c["Ruta Vta"]}</td>
<td>${c["Ruta Rep."]}</td>
<td>${c.Negocio}</td>
<td>${c.Canal}</td>
<td>${c["Nombre atencion"]}</td>
<td>${c["Frecuencia Visita"]}</td>
</tr>

`

})

document.getElementById("resultados").innerHTML=html

}

cargarClientes()

</script>

</body>
</html>
