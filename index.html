<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Consulta de Cliente</title>

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

input{
padding:12px;
font-size:18px;
border-radius:6px;
border:none;
width:220px;
}

button{
padding:12px 20px;
font-size:18px;
background:#22c55e;
border:none;
cursor:pointer;
border-radius:6px;
margin-left:10px;
}

#resultado{
margin-top:40px;
background:#1e293b;
padding:25px;
border-radius:10px;
width:420px;
margin:auto;
}

</style>

</head>

<body>

<h1>Consulta de Cliente</h1>

<input id="codigoCliente" placeholder="Ingrese código de cliente">
<button onclick="buscarCliente()">Buscar</button>

<div id="resultado"></div>

<script>

async function buscarCliente(){

const codigo = document.getElementById("codigoCliente").value.trim()

const response = await fetch("clientes.json")

const clientes = await response.json()

const resultado = clientes.find(c => String(c.Codigo).trim() === codigo)

if(resultado){

document.getElementById("resultado").innerHTML = `
<h2>${resultado.Nombre}</h2>

<p><b>Ruta:</b> ${resultado["Ruta Rep."]}</p>
<p><b>Código:</b> ${resultado.Codigo}</p>
<p><b>Negocio:</b> ${resultado.Negocio}</p>
<p><b>Canal:</b> ${resultado.Canal}</p>
<p><b>Nombre Atención:</b> ${resultado["Nombre atencion"]}</p>
<p><b>Frecuencia Visita:</b> ${resultado["Frecuencia Visita"]}</p>
`

}else{

document.getElementById("resultado").innerHTML = "Cliente no encontrado"

}

}

</script>

</body>

</html>
