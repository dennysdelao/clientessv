<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Consulta de Clientes</title>

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
padding:30px;
}

h1{
margin-bottom:25px;
}

input{
padding:12px;
font-size:18px;
border-radius:6px;
border:none;
width:300px;
}

#tablaResultados{
margin-top:30px;
width:95%;
margin-left:auto;
margin-right:auto;
border-collapse:collapse;
}

#tablaResultados th{
background:#1e293b;
padding:12px;
}

#tablaResultados td{
background:#334155;
padding:10px;
}

tr:hover{
background:#475569;
}

</style>

</head>

<body>

<h1>Consulta de Clientes</h1>

<input 
id="busqueda"
placeholder="Buscar por código o nombre"
onkeyup="buscarCliente()"
>

<table id="tablaResultados">

<thead>

<tr>
<th>Código</th>
<th>Nombre</th>
<th>Ruta Venta</th>
<th>Ruta Rep</th>
<th>Negocio</th>
<th>Canal</th>
<th>Nombre Atención</th>
<th>Frecuencia</th>
</tr>

</thead>

<tbody id="resultados"></tbody>

</table>

<script>

let clientes = []

async function cargarClientes(){

const response = await fetch("clientes.json")
clientes = await response.json()

}

function buscarCliente(){

const texto = document.getElementById("busqueda").value.toLowerCase()

if(texto === ""){
document.getElementById("resultados").innerHTML=""
return
}

const resultados = clientes.filter(c =>

String(c.Codigo).includes(texto) ||
(c.Nombre && c.Nombre.toLowerCase().includes(texto))

)

mostrarResultados(resultados)

}

function mostrarResultados(lista){

let html=""

lista.slice(0,50).forEach(c=>{

const rutaVenta =
c["Ruta Vta"] ||
c["Ruta Venta"] ||
c["Ruta_Vta"] ||
c["RutaVta"] ||
c["Ruta Rep."] ||
""

const nombreAtencion =
c["Nombre atencion"] ||
c["Nombre Atención"] ||
c["Atencion"] ||
c["atencion"] ||
c["NombreAtencion"] ||
""

html +=`

<tr>

<td>${c.Codigo}</td>
<td>${c.Nombre}</td>
<td>${rutaVenta}</td>
<td>${c["Ruta Rep."] ?? ""}</td>
<td>${c.Negocio ?? ""}</td>
<td>${c.Canal ?? ""}</td>
<td>${nombreAtencion}</td>
<td>${c["Frecuencia Visita"] ?? ""}</td>

</tr>

`

})

document.getElementById("resultados").innerHTML=html

}

cargarClientes()

</script>

</body>
</html>
