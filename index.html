<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Consulta de Cliente</title>

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

h1{
margin-bottom:30px;
}

input{
padding:12px;
font-size:18px;
border-radius:6px;
border:none;
width:260px;
}

button{
padding:12px 20px;
font-size:18px;
background:#22c55e;
border:none;
cursor:pointer;
border-radius:6px;
margin-left:10px;
}

button:hover{
background:#16a34a;
}

#resultado{
margin-top:40px;
background:#1e293b;
padding:25px;
border-radius:10px;
width:450px;
margin-left:auto;
margin-right:auto;
}

</style>

</head>

<body>

<h1>Consulta de Cliente</h1>

<input id="busqueda" placeholder="Ingrese código o nombre">

<button onclick="buscarCliente()">Buscar</button>

<div id="resultado"></div>

<script>

async function buscarCliente(){

const texto = document.getElementById("busqueda").value.trim().toLowerCase()

const response = await fetch("clientes_actualizado.json")

const clientes = await response.json()

const cliente = clientes.find(c => 
String(c.Codigo) === texto ||
c.Nombre.toLowerCase().includes(texto)
)

if(cliente){

document.getElementById("resultado").innerHTML = `
<h2>${cliente.Nombre}</h2>

<p><b>Código:</b> ${cliente.Codigo}</p>
<p><b>Ruta:</b> ${cliente["Ruta Rep."]}</p>
<p><b>Negocio:</b> ${cliente.Negocio}</p>
<p><b>Canal:</b> ${cliente.Canal}</p>
<p><b>Nombre Atención:</b> ${cliente["Nombre atencion"]}</p>
<p><b>Frecuencia Visita:</b> ${cliente["Frecuencia Visita"]}</p>
`

}else{

document.getElementById("resultado").innerHTML = "Cliente no encontrado"

}

}

</script>

</body>
</html>
